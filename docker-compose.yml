services:
  database:
    container_name: lab_database
    restart: unless-stopped
    image: postgres:16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: lab6
      POSTGRES_DB: lab6
    ports:
      - 5432:5432
    volumes:
      - db_data:/var/lib/postgresql/data
 
volumes:
  db_data: